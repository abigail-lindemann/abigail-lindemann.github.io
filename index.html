<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abigail Lindemann — Data Analytics &amp; AI-adjacent Portfolio</title>
  <meta name="description" content="Abigail Lindemann — Trinity University junior studying Business Analytics and Data Science. Projects in spatial analysis, institutional research, and data visualization.">
  <meta property="og:title" content="Abigail Lindemann">
  <meta property="og:description" content="Data science student figuring out a career in tech while AI rewrites the field.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="intro-overlay" id="intro-overlay">
    <canvas class="intro-canvas" id="intro-canvas" aria-hidden="true"></canvas>
    <div class="intro-content">
      <p class="intro-hint">Scroll, click, or press any key to enter</p>
      <button class="intro-skip" id="intro-skip">Enter site</button>
    </div>
  </div>
  <canvas class="bg-network" id="bg-network" aria-hidden="true"></canvas>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-nav" id="site-nav"></header>

  <main id="main">
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-content">
          <h1 id="hero-tagline"></h1>
          <p class="hero-byline" id="hero-kicker"></p>
          <p class="lede" id="hero-focus"></p>
          <a class="hero-link" href="/projects.html">See the work &rarr;</a>
        </div>
        <div class="hero-hub" id="hero-hub" role="navigation" aria-label="Quick links"></div>
      </div>
    </section>

    <section id="about" class="section-tint">
      <div class="container">
        <div class="section-head">
          <span class="kicker">About</span>
          <h2>Who I am</h2>
        </div>
        <div id="about-body" class="grid grid-2"></div>
      </div>
    </section>

    <section id="featured-projects">
      <div class="container">
        <div class="section-head">
          <span class="kicker">Featured work</span>
          <h2>Projects</h2>
        </div>
        <div class="grid grid-2" id="featured-projects-list"></div>
        <p class="mt-6"><a class="text-link" href="/projects.html">See all projects &rarr;</a></p>
      </div>
    </section>

    <section id="latest-posts" class="section-tint">
      <div class="container">
        <div class="section-head">
          <span class="kicker">Writing</span>
          <h2>Latest posts</h2>
        </div>
        <div class="post-list" id="latest-posts-list"></div>
        <p class="mt-6"><a class="text-link" href="/blog.html">Read the blog &rarr;</a></p>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <div class="section-head">
          <span class="kicker">Contact</span>
          <h2>Let's talk</h2>
        </div>
        <div id="contact-links" class="hero-actions"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/render.js"></script>
  <script src="/js/hero-hub.js"></script>
  <script src="/js/bg-network.js"></script>
  <script src="/js/intro.js"></script>
  <script src="/js/surreal.js"></script>
  <script>
    async function renderHome() {
      const profile = await fetchJSON('profile');
      document.getElementById('hero-kicker').textContent = profile.kicker;
      document.getElementById('hero-tagline').innerHTML = `${escapeHTML(profile.tagline)}`;
      document.getElementById('hero-focus').textContent = profile.heroSubline;
      initHeroHub('hero-hub', profile);

      const aboutBody = document.getElementById('about-body');
      const paragraphs = profile.about.paragraphs
        .map(p => escapeHTML(p).replace('[[projects]]', '<a class="text-link" href="/projects.html">Projects page</a>'))
        .map(p => `<p>${p}</p>`).join('');
      aboutBody.innerHTML = `
        <div>${paragraphs}<p>${escapeHTML(profile.about.closing)}</p></div>
        <div>
          <p class="lede">${escapeHTML(profile.about.aiNote)}</p>
          <div class="bits-list">${profile.personalBits.map(b => `<span class="bit">${escapeHTML(b)}</span>`).join('')}</div>
        </div>
      `;

      const projects = await fetchJSON('projects');
      const featured = profile.home.featuredProjectSlugs
        .map(slug => projects.find(p => p.slug === slug))
        .filter(Boolean);
      document.getElementById('featured-projects-list').innerHTML = featured.map(projectCard).join('');

      const posts = await fetchJSON('posts');
      const latest = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, profile.home.latestPostsCount || 3);
      document.getElementById('latest-posts-list').innerHTML = latest.map(postSummary).join('') || '<p class="text-muted">No posts yet.</p>';

      const links = profile.links;
      document.getElementById('contact-links').innerHTML = `
        <a class="btn btn-primary" href="mailto:${links.email}">Email me</a>
        <a class="btn btn-ghost" href="https://${links.linkedin}" target="_blank" rel="noopener">LinkedIn</a>
        <a class="btn btn-ghost" href="https://${links.github}" target="_blank" rel="noopener">GitHub</a>
      `;
    }

    function projectCard(p) {
      return `
        <a class="card-link" href="/projects.html#${p.slug}">
          <article class="card${p.featured ? ' card-featured' : ''}">
            ${p.motif ? `<div class="card-motif">${projectMotifSVG(p.motif)}</div>` : ''}
            <span class="date">${escapeHTML(p.displayDate)}${p.status === 'ongoing' ? ' · <span class=\"badge-ongoing\">Ongoing</span>' : ''}</span>
            <h3>${escapeHTML(p.title)}</h3>
            <p class="card-body">${escapeHTML(p.summary)}</p>
            ${p.stat ? `<div class="card-stat"><span class="stat-value">${escapeHTML(p.stat.value)}</span><span class="stat-label">${escapeHTML(p.stat.label)}</span></div>` : ''}
            <div class="tags">${p.tags.map(t => `<span class="tag" data-cat="${t.cat}">${escapeHTML(t.label)}</span>`).join('')}</div>
          </article>
        </a>
      `;
    }

    function postSummary(post) {
      return `
        <a class="card-link" href="/post.html?slug=${encodeURIComponent(post.slug)}">
          <article class="card">
            <span class="date">${escapeHTML(post.displayDate || post.date)}</span>
            <h3>${escapeHTML(post.title)}</h3>
            <p class="post-summary text-muted">${escapeHTML(post.summary)}</p>
          </article>
        </a>
      `;
    }

    renderHome();
    initBgNetwork('bg-network');
  </script>
</body>
</html>
