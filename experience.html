<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experience — Abigail Lindemann</title>
  <meta name="description" content="Work experience, leadership, skills, and certifications for Abigail Lindemann.">
  <meta property="og:title" content="Experience — Abigail Lindemann">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="site-nav" id="site-nav"></header>

  <main id="main">
    <section>
      <div class="container">
        <div class="section-head">
          <span class="kicker">Background</span>
          <h1>Experience</h1>
        </div>
        <div class="timeline" id="experience-timeline"></div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="section-head">
          <span class="kicker">Toolkit</span>
          <h2>Skills &amp; certifications</h2>
        </div>
        <div class="skill-groups">
          <div>
            <h3>Technical skills</h3>
            <div class="skill-pills" id="skills-list"></div>
          </div>
          <div>
            <h3>Certifications</h3>
            <div class="cert-list" id="cert-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="/js/render.js"></script>
  <script src="/js/bg-network.js"></script>
  <script src="/js/surreal.js"></script>
  <script>
    function parseSortDate(dates) {
      const match = dates.match(/(\d{4})/g);
      return match ? Math.max(...match.map(Number)) : 0;
    }

    async function renderExperience() {
      const experience = await fetchJSON('experience');
      const sorted = [...experience].sort((a, b) => {
        if (a.current !== b.current) return a.current ? -1 : 1;
        return parseSortDate(b.dates) - parseSortDate(a.dates);
      });
      document.getElementById('experience-timeline').innerHTML = sorted.map(timelineItem).join('');

      const skills = await fetchJSON('skills');
      document.getElementById('skills-list').innerHTML = skills.technical
        .map(s => `<span class="skill-pill">${escapeHTML(s)}</span>`).join('');
      document.getElementById('cert-list').innerHTML = skills.certifications
        .map(c => `<div class="cert-item"><span>${escapeHTML(c.name)}</span><span class="cert-date">${escapeHTML(c.displayDate)}</span></div>`).join('');
    }

    function timelineItem(item) {
      return `
        <div class="timeline-item">
          <div class="role">${escapeHTML(item.role)}</div>
          <div class="org">${escapeHTML(item.org)}</div>
          <div class="dates">${escapeHTML(item.dates)}</div>
          ${item.note ? `<p class="text-muted">${escapeHTML(item.note)}</p>` : ''}
          <ul>${item.bullets.map(b => `<li>${escapeHTML(b)}</li>`).join('')}</ul>
        </div>
      `;
    }

    renderExperience();
  </script>
</body>
</html>
